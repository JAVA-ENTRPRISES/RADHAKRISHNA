<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | BRIGHT FUTURE PUBLIC SCHOOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="contact-page container">
        <div class="contact-grid">
            
            <div class="contact-info-panel">
                <span class="eyebrow">Reach Out</span>
                <h1>Connect With Us</h1>
                <p class="description">Have questions about admissions, our curriculum, or facilities? We are here to help.</p>
                
                <div class="info-block">
                    <h4>Visit Us</h4>
                    <p>123 Education Lane, Bhubaneswar, Odisha</p>
                </div>
                <div class="info-block">
                    <h4>Call Us</h4>
                    <p>+91 674 1234567</p>
                </div>
                <div class="info-block">
                    <h4>Email Us</h4>
                    <p>admission@stxaviers.edu</p>
                </div>
            </div>

            <div class="contact-form-panel">
                <form>
                    <div class="input-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Subject</label>
                        <select>
                            <option>Admission Inquiry</option>
                            <option>General Question</option>
                            <option>Appointment Request</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Your query here..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary form-submit">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
