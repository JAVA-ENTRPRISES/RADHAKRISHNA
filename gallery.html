<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Gallery | BRIGHT FUTURE PUBLIC SCHOOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <header class="page-title-section">
            <span class="eyebrow">Visual Journey</span>
            <h1>Life at St. Xavier's</h1>
        </header>

        <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="campus">Campus</button>
            <button class="filter-btn" data-filter="events">Events</button>
            <button class="filter-btn" data-filter="sports">Sports</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item campus">
                <img src="https://images.unsplash.com/photo-1599666503851-9336d376c69f?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Library">
                <div class="overlay"><span>Hi-Tech Library</span></div>
            </div>
            <div class="gallery-item events">
                <img src="https://images.unsplash.com/photo-1541339907198-e08756defefe?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Graduation">
                <div class="overlay"><span>Annual Day</span></div>
            </div>
            <div class="gallery-item sports">
                <img src="https://images.unsplash.com/photo-1518611012118-ff6c7476e736?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Track">
                <div class="overlay"><span>Athletics Meet</span></div>
            </div>
            <div class="gallery-item campus">
                <img src="https://images.unsplash.com/photo-1562774053-701939374585?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=400" alt="Lab">
                <div class="overlay"><span>Robotics Lab</span></div>
            </div>
             </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
